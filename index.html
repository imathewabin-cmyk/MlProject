<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trash Detection Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .page {
      width: 100%;
      max-width: 900px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    .hero {
      padding: 32px 40px;
      text-align: center;
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: #ffffff;
    }

    .hero h1 {
      margin: 0;
      font-size: 2.2rem;
      line-height: 1.2;
    }

    .hero p {
      margin: 16px auto 0;
      max-width: 700px;
      font-size: 1rem;
      opacity: 0.92;
    }

    .content {
      padding: 30px 40px;
      display: grid;
      gap: 24px;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
    }

    .start-button {
      background: #2563eb;
      color: white;
    }

    .status {
      font-size: 0.95rem;
      color: #4b5563;
      text-align: center;
    }

    #webcam-container {
      display: flex;
      justify-content: center;
    }

    #label-container {
      display: grid;
      gap: 10px;
      justify-content: center;
      font-family: monospace;
      color: #111827;
    }

    .label-item {
      background: #eff6ff;
      border-radius: 12px;
      padding: 12px 16px;
      min-width: 260px;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
    }

    .footer {
      text-align: center;
      font-size: 0.88rem;
      color: #6b7280;
      padding: 16px 40px 28px;
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Trash Detection Demo</h1>
      <p>Use your webcam to classify trash items with a Teachable Machine image model. Click Start, allow camera access, and watch live predictions.</p>
    </section>

    <section class="content">
      <div class="button-row">
        <button class="start-button" type="button" onclick="init()">Start</button>
      </div>
      <div id="status" class="status">Model is not loaded yet.</div>
      <div id="webcam-container"></div>
      <div id="label-container"></div>
    </section>

    <div class="footer">Built with TensorFlow.js and Teachable Machine.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/FbooIfkIMq/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
      const status = document.getElementById("status");
      status.textContent = "Loading model...";

      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      try {
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(320, 320, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        const container = document.getElementById("webcam-container");
        container.innerHTML = "";
        container.appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
          const label = document.createElement("div");
          label.className = "label-item";
          label.textContent = "Loading...";
          labelContainer.appendChild(label);
        }

        status.textContent = "Point the camera at items and watch the predictions.";
      } catch (error) {
        status.textContent = "Unable to load model or webcam. Please check camera permissions.";
        console.error(error);
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);
      for (let i = 0; i < maxPredictions; i++) {
        const classPrediction = `${prediction[i].className}: ${(
          prediction[i].probability * 100
        ).toFixed(1)}%`;
        labelContainer.childNodes[i].innerHTML = classPrediction;
      }
    }
  </script>
</body>
</html>
